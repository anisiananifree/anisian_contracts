name: 📋 Listing / integration update
description: Report a successful (or rejected) submission of ANI to a wallet, explorer, DEX UI, or aggregator.
labels: ["listing"]
body:
  - type: markdown
    attributes:
      value: |
        Help the community keep track of where ANI is listed. Both successful listings and rejections are useful — it tells the next person what to expect.

  - type: dropdown
    id: platform
    attributes:
      label: Which platform?
      options:
        - CoinGecko
        - CoinMarketCap
        - Trust Wallet (trustwallet/assets)
        - Uniswap default token list
        - DexScreener
        - GeckoTerminal
        - Birdeye
        - 1inch token list
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: What is the status?
      options:
        - ✅ Listed / merged
        - ⏳ Submitted, awaiting review
        - ❌ Rejected
        - 🚧 In progress (working on submission)
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link
      description: URL to the listing, the open PR, or the platform's review thread.
      placeholder: "https://..."

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: |
        - For rejections: paste the reason you were given (so others know what to fix).
        - For successful listings: any requirements you had to meet that aren't documented here.
        - For in-progress submissions: where you are stuck.
